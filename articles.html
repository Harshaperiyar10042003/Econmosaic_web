<style>
html { scroll-behavior: smooth; }

body{
    margin:0;
    font-family: 'Inter', Arial, sans-serif;
    background: #f5f7fa;
    color: #333;
    
}

/* NAVIGATION */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 80px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
}

.logo {
    font-size: 30px;
    font-weight: 800;
}

.logo span { color: #2C74FF; }

nav a {
    position: relative; /* needed for ::after positioning */
    text-decoration: none;
    color: #333;
    margin: 0 22px;
    font-weight: 500;
    font-size: 17px;
    transition: color 0.3s ease;
}

nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px; /* distance from text */
    width: 0;
    height: 3px;
    background: linear-gradient(90deg, #ff7a18, #2C74FF, #af002d); /* gradient line */
    border-radius: 2px;
    transition: width 0.4s ease;
}

nav a:hover::after {
    width: 100%; /* full underline on hover */
}

nav a:hover {
    color: #2C74FF; /* optional text color change on hover */
}


.login {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 17px;
    cursor: pointer;
}

.login img {
    width: 24px;
}

/* ------------------ Section ------------------ */
.section{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding:35px 25px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 40px;
    margin-top: 50px;
    max-height: 520px;       /* SCROLL HEIGHT */
    overflow-y: auto;        /* ENABLE SCROLL */
}

/* Scrollbar Styling */
.section::-webkit-scrollbar{
    width: 8px;
}
.section::-webkit-scrollbar-track{
    background: #f1f1f1;
    border-radius: 10px;
}
.section::-webkit-scrollbar-thumb{
    background: #888;
    border-radius: 10px;
}
.section::-webkit-scrollbar-thumb:hover{
    background: #555;
}

/* Firefox */
.section{
    scrollbar-width: thin;
    scrollbar-color: #888 #f1f1f1;
}

/* ------------------ Section Header ------------------ */
.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
}
.section-header h2{
    font-size:32px;
    font-weight:700;
    font-family:"Georgia","Times New Roman",serif;
    margin:0;
    color: #1a1a1a;
}

/* ------------------ Grid Layout ------------------ */
.content-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    column-gap:40px;
}
@media(max-width:900px){
    .content-grid{ grid-template-columns:1fr; }
}

/* ------------------ Article Card ------------------ */
.article{
    display:flex;
    gap:22px;
    margin-bottom:26px;
    align-items:flex-start;
    background: #fdfdfd;
    border-radius:12px;
    padding:12px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.article:hover{
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}

/* ------------------ Image ------------------ */
.article img{
    width:230px;
    height:150px;
    object-fit:cover;
    border-radius:12px;
    background:#eee;
    flex-shrink:0;
}

/* ------------------ Title ------------------ */
.article h3{
    font-size:20px;
    font-weight:600;
    margin:8px 0;
    font-family:"Georgia","Times New Roman",serif;
    color: #222;
}

/* ------------------ Underline ------------------ */
.article .line{
    width:100%;
    height:1px;
    background:#ddd;
    margin-bottom:8px;
}

/* ------------------ Meta ------------------ */
.meta{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:14px;
    color:#555;
}
.meta i{
    font-size:16px;
    color:#070707;
}

/* ------------------ Divider ------------------ */
.section-divider{
    height:1px;
    background:#e0e0e0;
    margin:20px 0;
}

/* ------------------ Links ------------------ */
a{
    text-decoration:none;
    color:inherit;
}

/* ------------------ Responsive ------------------ */
@media(max-width:600px){
    body{ padding:30px 20px; }
    .section{ padding:25px 15px; max-height: none; }
    .article img{ width:150px; height:100px; }
    .article h3{ font-size:16px; }
}
</style>
<link rel="stylesheet" href="style.css">

<script>

function articleHTML(title, img, link, date, year){
    return `
    <div class="article">
        <a href="${link}">
            <img src="${img}">
        </a>
        <div>
            <a href="${link}">
                <h3>${title}</h3>
            </a>
            <div class="line"></div>
            <div class="meta">
                <i class="fa-regular fa-calendar"></i>
                <span>${date}/${year || 2025}</span>
            </div>
        </div>
    </div>
    `;
}


function renderSection(title, articles){

    // ✅ SORT BY MOST RECENT DATE FIRST
    articles.sort((a, b) => {
    const dateA = parseDate(a.date, a.year); // use year if present
    const dateB = parseDate(b.date, b.year);
    return dateB - dateA; // most recent first
});


    const sectionId = title.replace(/\s+/g,'-').toLowerCase();

    let html = `
    <div class="section" id="${sectionId}">
        <div class="section-header">
            <h2>${title}</h2>
        </div>
        <div class="content-grid">`;

    const col1 = [], col2 = [];

   articles.forEach((a, i) => {
    const card = articleHTML(a.title, a.img, a.link, a.date, a.year);
    if(i % 2 === 0) col1.push(card);
    else col2.push(card);
});


    html += `<div>${col1.join('')}</div><div>${col2.join('')}</div>`;
    html += `</div></div><div class="section-divider"></div>`;

    document.write(html);
}



function parseDate(d, yearOverride) {
    const [day, month] = d.split('/');
    // If yearOverride is provided, use it; otherwise, default to 2025
    return new Date(yearOverride || 2025, month - 1, day);
}

// Example usage:
const date1 = parseDate("05/01", 2026); // This document → 2026
const date2 = parseDate("12/11");  // Other documents → 2025

</script>
